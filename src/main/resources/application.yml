spring:
  application:
    name: url-shortener
  
  # Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${RENDER_DB_HOST:localhost}:${RENDER_DB_PORT:5432}/${RENDER_DB_NAME:shortener_db}}
    username: ${SPRING_DATASOURCE_USERNAME:shortener}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    
  # JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis Configuration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:redis_password}

server:
  port: 8080

app:
  shortener:
    domain: http://localhost:8080/
